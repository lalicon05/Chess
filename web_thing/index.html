<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="utf-8" />
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0"/>
    <title>Dennis the chess engis</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
    <div id="menu" class="container">
        <h1>Sjakk Program</h1>

        <button onclick="StartGame('pvp')">Player vs Player</button>
        <button onclick="StartGame('engine')">Player vs Dennis</button>
    </div>

    <div id="game" class="container">
        <h1>Dennis (Chess engine)</h1>
        <div id="main"></div>
        <button onclick="EndGame('Enemy forfeit, you win')"> Give up </button>
        <button onclick="FlipBoard()">Switch sides</button>
    </div>

    <div id="result" class="requestBox">
        <p id="resultMessage"></p>
        <button onclick="Rematch()"> Omkamp </button>    
        <button onclick="RenderScene(0)"> Tilbake </button>
    </div>
</body>

<script type="module" src="index.js"></script>
